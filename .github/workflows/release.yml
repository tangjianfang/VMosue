name: Release

# Builds the VMosue installer and uploads it as a workflow artifact
# on every push to main and every pull request. When a tag matching
# vX.Y.Z is pushed, the installer is also attached to a GitHub Release.
#
# See installer/README.md for the local build story.

on:
  push:
    branches: [main]
    tags:    ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to create GitHub Releases on tag pushes

jobs:
  build-installer:
    name: Build Windows installer
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 9e3a78bf79448391654b2490573a06b1bb6085b0

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

      - name: Configure
        run: cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg_installed/x64-windows/share/vcpkg/vcpkg.cmake" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      # NSIS is pre-installed on windows-2022 runners. If it ever stops
      # being available, swap to jurkov/NSIS@1 with the default version,
      # or to jurkov/NSIS with version: 3.x to pin explicitly.
      - name: Build Installer
        run: makensis /WX installer/nsi/VMosue.nsi

      - name: Verify installer artifact
        # Fail loudly if makensis didn't produce the expected exe.
        shell: bash
        run: ls -la VMosue-Setup-*.exe

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: vmosue-installer
          path: VMosue-Setup-*.exe

  publish-release:
    name: Publish GitHub Release
    needs: build-installer
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-2022
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vmosue-installer
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: VMosue-Setup-*.exe
          generate_release_notes: true